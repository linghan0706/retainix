name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify preview secrets
        id: verify
        shell: bash
        run: |
          if [[ -n "${{ secrets.VERCEL_TOKEN }}" && -n "${{ secrets.VERCEL_ORG_ID }}" && -n "${{ secrets.VERCEL_PROJECT_ID }}" ]]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy preview
        id: deploy
        if: steps.verify.outputs.can_deploy == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        shell: bash
        run: |
          pnpm dlx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          pnpm dlx vercel build --token="$VERCEL_TOKEN"
          URL=$(pnpm dlx vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: steps.verify.outputs.can_deploy == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Preview deployment is ready:\n\n${{ steps.deploy.outputs.preview_url }}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Skip preview notice
        if: steps.verify.outputs.can_deploy != 'true'
        run: echo "Vercel secrets are missing. Preview deployment skipped by policy."
