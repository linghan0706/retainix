name: Bug Report
description: Report a reproducible bug.
title: "[Bug] "
labels: ["type: bug", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough details to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Include exact steps, sample input, and route/module.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: e.g. web@1.2.3

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, browser, Node version, pnpm version

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      render: shell
